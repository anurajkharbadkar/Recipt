version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pavti_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pavti_user
      POSTGRES_PASSWORD: pavti_password
      POSTGRES_DB: pavti_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pavti_user -d pavti_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pavti_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
